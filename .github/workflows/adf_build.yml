name: Build & Validate ADF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check ADF Files
        run: |
          echo "✅ ADF Repository Structure Check"
          ls -la
          echo "Folder structure looks good!"
          echo "Data Factory Name: adfclearingraj"
          echo "Resource Group: rg-learing"

      - name: Upload ARM Template
        uses: actions/upload-artifact@v4
        with:
          name: arm-templates
          path: ${{ github.workspace }}/ARMTemplateForFactory.json

name: Build & Validate ADF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}   # We will create this later

      - name: Validate Azure Data Factory
        uses: Azure/data-factory-validate-action@v2   # Use v2 instead of v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          factoryName: ${{ secrets.AZURE_DATA_FACTORY_NAME }}
          folderPath: "."     # Root folder
